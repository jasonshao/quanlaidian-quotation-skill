name: Notify OpenClaw On Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        id: payload
        run: |
          cat > payload.json <<JSON
          {
            "event": "skill_release_published",
            "repo": "${{ github.repository }}",
            "tag": "${{ github.event.release.tag_name || github.ref_name }}",
            "release_name": "${{ github.event.release.name || github.ref_name }}",
            "release_url": "${{ github.event.release.html_url || github.server_url }}/${{ github.repository }}/releases",
            "published_at": "${{ github.event.release.published_at || github.event.repository.updated_at }}"
          }
          JSON
          cat payload.json

      - name: Notify webhook
        env:
          OPENCLAW_UPDATE_WEBHOOK: ${{ secrets.OPENCLAW_UPDATE_WEBHOOK }}
        run: |
          if [ -z "$OPENCLAW_UPDATE_WEBHOOK" ]; then
            echo "OPENCLAW_UPDATE_WEBHOOK is not set, skip notify"
            exit 0
          fi
          curl -sS -X POST "$OPENCLAW_UPDATE_WEBHOOK" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json
          echo "Notify sent"
